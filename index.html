<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7f8fa" />
    <title>Market Radar</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=65" />
  </head>
  <body>
    <div class="app-shell">
      <nav class="tabs" aria-label="视图">
        <button class="tab active" data-view="dashboard">总览</button>
        <button class="tab" data-view="today">今日</button>
        <button class="tab" data-view="stocks">股票</button>
        <button class="tab" data-view="reports">报告</button>
      </nav>

      <main>
        <section id="todayView" class="view">
          <section class="panel today-panel">
            <div class="today-toolbar">
              <button class="today-refresh" id="refreshBtn" type="button" title="点击刷新行情" aria-label="点击今日日期刷新行情">
                <span id="todayLabel"></span>
                <span class="refresh-symbol">↻</span>
              </button>
              <button class="today-sort-button" id="todaySortBtn" type="button">涨幅排序</button>
            </div>
            <div class="today-stock-list" id="todayStockList"></div>
          </section>
        </section>

        <section id="dashboardView" class="view active">
          <div class="metric-grid">
            <article class="metric-card">
              <span>关注股票</span>
              <strong id="metricStocks">0</strong>
            </article>
            <article class="metric-card">
              <span>今日均涨幅</span>
              <strong id="metricDaily">-</strong>
            </article>
            <article class="metric-card">
              <span>最热概念</span>
              <strong id="metricConcept">-</strong>
            </article>
          </div>

          <div class="dashboard-grid">
            <section class="panel wide-panel">
              <div class="panel-head">
                <h2>股票池</h2>
              </div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>股票</th>
                      <th>添加日</th>
                      <th>最新价</th>
                      <th>添加以来</th>
                      <th>今日</th>
                      <th>周</th>
                      <th>月</th>
                      <th>概念</th>
                    </tr>
                  </thead>
                  <tbody id="stockTableBody"></tbody>
                </table>
              </div>
              <div class="empty-state" id="stockEmpty">暂无股票</div>
            </section>

            <section class="panel wide-panel">
              <div class="panel-head">
                <h2>概念聚合</h2>
              </div>
              <div id="conceptList" class="concept-list"></div>
            </section>

          </div>
        </section>

        <section id="stocksView" class="view">
          <section class="quick-add stock-add-form" aria-label="添加股票">
            <label>
              <span>代码</span>
              <input id="stockCode" inputmode="latin" autocomplete="off" placeholder="600519" />
            </label>
            <label>
              <span>名称</span>
              <input id="stockName" autocomplete="off" placeholder="贵州茅台" />
            </label>
            <div class="market-preview">
              <span>市场</span>
              <strong id="marketPreview">输入代码或名称后识别</strong>
            </div>
            <label>
              <span>概念</span>
              <input id="stockConcepts" autocomplete="off" placeholder="AI算力、机器人" />
            </label>
            <button id="addStockBtn" class="primary-button">＋ 添加</button>
          </section>

          <div class="split-grid">
            <section class="panel wide-panel">
              <div class="panel-head">
                <h2>个股明细</h2>
              </div>
              <div id="stockCards" class="stock-card-list"></div>
            </section>
          </div>

          <div class="split-grid stock-data-tools">
            <section class="panel wide-panel">
              <div class="panel-head">
                <h2>云端同步</h2>
                <span class="status-pill" id="supabaseStatus">未连接</span>
              </div>
              <div class="cloud-sync-form">
                <label>
                  <span>Supabase Project URL</span>
                  <input id="supabaseUrl" autocomplete="off" placeholder="https://xxxx.supabase.co" />
                </label>
                <label>
                  <span>Anon Key</span>
                  <input id="supabaseAnonKey" autocomplete="off" placeholder="eyJhbGciOi..." />
                </label>
                <div class="button-row">
                  <button class="primary-button" id="saveSupabaseBtn">保存并上传</button>
                  <button class="ghost-button" id="pullSupabaseBtn">从云端读取</button>
                </div>
              </div>
            </section>
            <section class="panel">
              <div class="panel-head">
                <h2>数据备份</h2>
              </div>
              <div class="button-row">
                <button class="primary-button" id="exportBtn">导出 JSON</button>
                <label class="file-button">
                  导入 JSON
                  <input id="importFile" type="file" accept="application/json" />
                </label>
              </div>
            </section>
            <section class="panel">
              <div class="panel-head">
                <h2>维护</h2>
              </div>
              <div class="button-row">
                <button class="ghost-button" id="rebuildBtn">同步概念</button>
                <button class="danger-button" id="clearBtn">清空数据</button>
              </div>
            </section>
          </div>
        </section>

        <section id="reportsView" class="view">
          <section class="panel wide-panel">
            <div class="panel-head">
              <h2>报告</h2>
              <div class="report-toolbar">
                <button class="primary-button" id="buildReportsBtn">生成日报</button>
                <button class="ghost-button" id="copyReportBtn">复制最新报告</button>
              </div>
            </div>
            <div id="reportList" class="report-list"></div>
          </section>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js?v=65"></script>
  </body>
</html>
